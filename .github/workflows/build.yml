name: Build GoodbyeDPI Windows

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      
    - name: Download WinDivert
      run: |
        curl -L -o WinDivert.zip https://github.com/basil00/Divert/releases/download/v2.2.2/WinDivert-2.2.2-A.zip
        tar -xf WinDivert.zip
        
    - name: Compile x86_64
      run: |
        cd src
        cl.exe /O2 /W3 /D_CRT_SECURE_NO_WARNINGS /DWINVER=0x0600 /D_WIN32_WINNT=0x0600 goodbyedpi.c dnsredir.c ttltrack.c utils.c windivert.c blackwhitelist.c service.c /link /OUT:goodbyedpi.exe ws2_32.lib wininet.lib iphlpapi.lib kernel32.lib advapi32.lib /LIBPATH:..\WinDivert-2.2.2-A\x64 WinDivert.lib
      shell: cmd
      
    - name: Prepare x86_64 directory
      run: |
        mkdir x86_64
        copy src\goodbyedpi.exe x86_64\
        copy WinDivert-2.2.2-A\x64\WinDivert64.sys x86_64\
        copy WinDivert-2.2.2-A\x64\WinDivert.dll x86_64\
      shell: cmd
      
    - name: Upload output file x86_64
      uses: actions/upload-artifact@v4
      with:
        name: goodbyedpi-x86_64
        path: x86_64/
